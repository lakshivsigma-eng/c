<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blink — Chat with Friends</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getDatabase, ref, set, get, push, onValue, off, serverTimestamp, query, orderByChild, limitToLast, update }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

// ─── PASTE YOUR FIREBASE CONFIG HERE ───────────────────────────────────────
// Go to https://console.firebase.google.com → New project → Web app → copy config
const firebaseConfig = {
  apiKey: "AIzaSyAcmevlI-FqPB_biNZoPvLH2iyxTYoK3lc",
  authDomain: "dddd-b82bc.firebaseapp.com",
  databaseURL: "https://dddd-b82bc-default-rtdb.firebaseio.com",
  projectId: "dddd-b82bc",
  storageBucket: "dddd-b82bc.firebasestorage.app",
  messagingSenderId: "804910597236",
  appId: "1:804910597236:web:4c4b984f678e4dba4e7d21",
  measurementId: "G-9WJGH5739J"
};
// ───────────────────────────────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ── State ──────────────────────────────────────────────────────────────────
let currentUser = null;
let currentChatId = null;
let currentChatListener = null;
let usersListener = null;

// ── Helpers ────────────────────────────────────────────────────────────────
function chatId(uid1, uid2) {
  return [uid1, uid2].sort().join("__");
}

function timeAgo(ts) {
  if (!ts) return "";
  const diff = Date.now() - ts;
  if (diff < 60000) return "just now";
  if (diff < 3600000) return Math.floor(diff / 60000) + "m ago";
  if (diff < 86400000) return Math.floor(diff / 3600000) + "h ago";
  return new Date(ts).toLocaleDateString();
}

function avatar(name) {
  return name ? name[0].toUpperCase() : "?";
}

function randomColor(str) {
  const colors = ["#7c6fff","#ff6fb0","#4fffb0","#ffb84f","#4fc3ff","#ff4f6f","#b4ff4f"];
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

function showError(msg) {
  const el = document.getElementById("error-toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 4000);
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ── Auth ────────────────────────────────────────────────────────────────────
window.doSignup = async function() {
  const name = document.getElementById("signup-name").value.trim();
  const email = document.getElementById("signup-email").value.trim();
  const pass = document.getElementById("signup-pass").value;
  if (!name || !email || !pass) return showError("Fill in all fields!");
  if (name.length < 2) return showError("Name too short!");
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    await set(ref(db, `users/${cred.user.uid}`), {
      name, email, uid: cred.user.uid,
      createdAt: Date.now(), online: true
    });
  } catch (e) {
    showError(e.message.replace("Firebase: ", "").replace(/ \(auth.*\)/, ""));
  }
};

window.doLogin = async function() {
  const email = document.getElementById("login-email").value.trim();
  const pass = document.getElementById("login-pass").value;
  if (!email || !pass) return showError("Fill in all fields!");
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    showError("Wrong email or password.");
  }
};

window.doLogout = async function() {
  if (currentUser) await update(ref(db, `users/${currentUser.uid}`), { online: false });
  await signOut(auth);
};

// ── Auth State ──────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    await update(ref(db, `users/${user.uid}`), { online: true, lastSeen: serverTimestamp() });
    document.getElementById("my-name").textContent = user.displayName || user.email;
    document.getElementById("my-avatar").textContent = avatar(user.displayName);
    document.getElementById("my-avatar").style.background = randomColor(user.uid);
    showScreen("app-screen");
    loadUsers();
  } else {
    currentUser = null;
    if (currentChatListener) { off(currentChatListener); currentChatListener = null; }
    showScreen("auth-screen");
  }
});

// ── Users / Friends ─────────────────────────────────────────────────────────
function loadUsers() {
  const usersRef = ref(db, "users");
  onValue(usersRef, (snap) => {
    const data = snap.val() || {};
    const users = Object.values(data).filter(u => u.uid !== currentUser.uid);
    renderUserList(users, document.getElementById("search-input").value.toLowerCase());
  });
}

function renderUserList(users, filter = "") {
  const list = document.getElementById("users-list");
  const filtered = users.filter(u => u.name.toLowerCase().includes(filter) || u.email.toLowerCase().includes(filter));
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">No users found</div>`;
    return;
  }
  list.innerHTML = filtered.map(u => `
    <div class="user-item" onclick="openChat('${u.uid}','${u.name}','${u.email}')">
      <div class="user-av" style="background:${randomColor(u.uid)}">${avatar(u.name)}</div>
      <div class="user-info">
        <div class="user-name">${u.name}</div>
        <div class="user-email">${u.email}</div>
      </div>
      <div class="online-dot ${u.online ? 'is-online' : ''}"></div>
    </div>
  `).join("");
}

document.getElementById("search-input").addEventListener("input", function() {
  const usersRef = ref(db, "users");
  get(usersRef).then(snap => {
    const data = snap.val() || {};
    const users = Object.values(data).filter(u => u.uid !== currentUser.uid);
    renderUserList(users, this.value.toLowerCase());
  });
});

// ── Chat ────────────────────────────────────────────────────────────────────
window.openChat = async function(uid, name, email) {
  currentChatId = chatId(currentUser.uid, uid);

  // Mobile: hide sidebar
  document.getElementById("sidebar").classList.remove("open");

  // Update header
  document.getElementById("chat-name").textContent = name;
  document.getElementById("chat-avatar").textContent = avatar(name);
  document.getElementById("chat-avatar").style.background = randomColor(uid);
  document.getElementById("chat-placeholder").style.display = "none";
  document.getElementById("chat-area").style.display = "flex";

  // Mark active
  document.querySelectorAll(".user-item").forEach(el => el.classList.remove("active"));

  // Listen to messages
  if (currentChatListener) off(currentChatListener);
  const msgsRef = query(ref(db, `chats/${currentChatId}/messages`), orderByChild("ts"), limitToLast(100));
  currentChatListener = onValue(msgsRef, (snap) => {
    const data = snap.val() || {};
    const msgs = Object.values(data).sort((a, b) => a.ts - b.ts);
    renderMessages(msgs);
  });
};

function renderMessages(msgs) {
  const box = document.getElementById("messages-box");
  let html = "";
  let lastUid = null;
  for (const m of msgs) {
    const mine = m.uid === currentUser.uid;
    const showName = m.uid !== lastUid;
    lastUid = m.uid;
    const bubbleStyle = mine
      ? 'style="background:#111111;color:#ffffff;border:2px solid #444;border-radius:18px;border-bottom-right-radius:4px;padding:10px 16px;max-width:70%;"'
      : 'style="background:#ffffff;color:#000000;border:2px solid #cccccc;border-radius:18px;border-bottom-left-radius:4px;padding:10px 16px;max-width:70%;"';
    const timeStyle = mine ? 'style="font-size:0.7rem;margin-top:5px;color:#aaa;text-align:right;font-family:monospace;"' : 'style="font-size:0.7rem;margin-top:5px;color:#666;text-align:right;font-family:monospace;"';
    const textStyle = mine ? 'style="color:#ffffff;word-break:break-word;"' : 'style="color:#000000;font-weight:600;word-break:break-word;"';
    const rowStyle = mine ? 'style="display:flex;justify-content:flex-end;margin:2px 0;"' : 'style="display:flex;justify-content:flex-start;margin:2px 0;"';
    const senderStyle = mine ? 'style="text-align:right;font-size:0.7rem;font-weight:700;color:#7c6fff;margin-bottom:3px;font-family:monospace;text-transform:uppercase;"' : 'style="text-align:left;font-size:0.7rem;font-weight:700;color:#ff6fb0;margin-bottom:3px;font-family:monospace;text-transform:uppercase;"';
    html += `<div style="margin-bottom:6px;">
      ${showName ? `<div ${senderStyle}>${mine ? 'You' : escapeHtml(m.name || 'Friend')}</div>` : ''}
      <div ${rowStyle}>
        <div ${bubbleStyle}>
          <div ${textStyle}>${escapeHtml(m.text)}</div>
          <div ${timeStyle}>${timeAgo(m.ts)}</div>
        </div>
      </div>
    </div>`;
  }
  box.innerHTML = html;
  box.scrollTop = box.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

window.sendMessage = async function() {
  const input = document.getElementById("msg-input");
  const text = input.value.trim();
  if (!text || !currentChatId) return;
  input.value = "";
  const msgsRef = ref(db, `chats/${currentChatId}/messages`);
  await push(msgsRef, {
    text, uid: currentUser.uid,
    name: currentUser.displayName,
    ts: Date.now()
  });
};

document.getElementById("msg-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); window.sendMessage(); }
});

// Mobile sidebar toggle
window.toggleSidebar = function() {
  document.getElementById("sidebar").classList.toggle("open");
};

// Tab switching
window.switchTab = function(tab) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add("active");
  document.getElementById(`tab-${tab}`).classList.add("active");
};

// Admin: delete ALL users from database + current auth account
window.deleteAllAccounts = async function() {
  if (!confirm("⚠️ DELETE ALL ACCOUNTS?\nThis wipes everyone. Cannot be undone!")) return;
  if (!confirm("Are you 100% sure? Every account will be gone forever.")) return;
  try {
    // Wipe all users and chats from database
    await set(ref(db, 'users'), null);
    await set(ref(db, 'chats'), null);
    // Delete current auth user (only one we can delete client-side)
    await currentUser.delete();
    alert("All accounts and chats deleted.");
  } catch(e) {
    if (e.code === 'auth/requires-recent-login') {
      showError("Log out, log back in, then try again.");
    } else {
      showError("Error: " + e.message);
    }
  }
};

// Auth tab switching
window.showLogin = function() {
  document.getElementById("signup-form").style.display = "none";
  document.getElementById("login-form").style.display = "flex";
  document.getElementById("auth-toggle").innerHTML = `New here? <a onclick="showSignup()">Create account</a>`;
};
window.showSignup = function() {
  document.getElementById("login-form").style.display = "none";
  document.getElementById("signup-form").style.display = "flex";
  document.getElementById("auth-toggle").innerHTML = `Already have an account? <a onclick="showLogin()">Sign in</a>`;
};
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d14;
  --surface: #13131f;
  --surface2: #1c1c2e;
  --border: #252538;
  --accent: #7c6fff;
  --accent2: #ff6fb0;
  --text: #e2e2f0;
  --text2: #7878a0;
  --green: #3effa0;
  --radius: 16px;
}

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── SCREENS ── */
.screen { display: none; flex: 1; height: 100vh; }
.screen.active { display: flex; }

/* ── AUTH SCREEN ── */
#auth-screen {
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(ellipse 80% 60% at 10% 90%, #7c6fff22 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 10%, #ff6fb022 0%, transparent 60%),
    var(--bg);
}

.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 32px 80px #0008;
}

.auth-logo {
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}

.auth-sub {
  color: var(--text2);
  font-size: 0.92rem;
  margin-bottom: 36px;
  font-family: 'Space Mono', monospace;
}

.auth-form {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field label {
  font-size: 0.78rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text2);
}

.field input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
}

.field input:focus { border-color: var(--accent); }

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #a06fff);
  border: none;
  border-radius: 10px;
  padding: 13px;
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: 0.98rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 6px;
  transition: opacity 0.2s, transform 0.1s;
}
.btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

#auth-toggle {
  text-align: center;
  margin-top: 20px;
  color: var(--text2);
  font-size: 0.88rem;
}
#auth-toggle a {
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
}

/* ── APP SCREEN ── */
#app-screen {
  flex-direction: row;
  overflow: hidden;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 300px;
  min-width: 300px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  transition: transform 0.25s;
}

.sidebar-header {
  padding: 20px 20px 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
}

.brand {
  font-size: 1.4rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 14px;
}

.my-profile {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.my-av {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.9rem; color: #fff;
  flex-shrink: 0;
}

.my-name-wrap { flex: 1; overflow: hidden; }
.my-name-label { font-size: 0.75rem; color: var(--text2); font-family: 'Space Mono', monospace; }
#my-name { font-weight: 700; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.logout-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text2);
  font-family: 'Syne', sans-serif;
  font-size: 0.78rem;
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.logout-btn:hover { border-color: var(--accent2); color: var(--accent2); }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.tab-btn {
  flex: 1;
  background: none;
  border: none;
  border-radius: 8px;
  padding: 7px;
  color: var(--text2);
  font-family: 'Syne', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn.active {
  background: var(--surface2);
  color: var(--accent);
}

.tab-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.tab-panel.active { display: flex; }

/* Search */
.search-wrap {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
#search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 14px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 0.88rem;
  outline: none;
  transition: border-color 0.2s;
}
#search-input:focus { border-color: var(--accent); }

/* Users list */
#users-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
#users-list::-webkit-scrollbar { width: 4px; }
#users-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.user-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.user-item:hover, .user-item.active { background: var(--surface2); }

.user-av {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 1rem; color: #fff;
  flex-shrink: 0;
}

.user-info { flex: 1; overflow: hidden; }
.user-name { font-weight: 700; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-email { color: var(--text2); font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.online-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
}
.online-dot.is-online { background: var(--green); box-shadow: 0 0 6px var(--green); }

.empty-state {
  text-align: center;
  color: var(--text2);
  padding: 32px;
  font-size: 0.88rem;
  font-family: 'Space Mono', monospace;
}

/* ── MAIN CHAT ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(ellipse 50% 40% at 80% 90%, #7c6fff0d 0%, transparent 60%),
    var(--bg);
}

/* Chat placeholder */
#chat-placeholder {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  gap: 12px;
}
.placeholder-icon {
  font-size: 3rem;
  filter: grayscale(1) opacity(0.3);
}
.placeholder-text {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text2);
}
.placeholder-sub { font-size: 0.85rem; font-family: 'Space Mono', monospace; }

/* Chat area */
#chat-area {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

.chat-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.menu-btn {
  display: none;
  background: none;
  border: none;
  color: var(--text2);
  font-size: 1.4rem;
  cursor: pointer;
  padding: 0 8px 0 0;
}

#chat-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; color: #fff;
  flex-shrink: 0;
}

#chat-name { font-weight: 700; font-size: 1.05rem; }

#messages-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#messages-box::-webkit-scrollbar { width: 4px; }
#messages-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg-group { display: flex; flex-direction: column; margin-bottom: 2px; }

.msg-sender {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  padding: 0 4px;
  font-family: 'Space Mono', monospace;
}
.sender-mine { color: var(--accent); text-align: right; }
.sender-theirs { color: var(--accent2); text-align: left; }

.msg-row {
  display: flex;
}
.msg-row.mine { justify-content: flex-end; }
.msg-row.theirs { justify-content: flex-start; }

.bubble {
  max-width: 70%;
  border-radius: 18px;
  padding: 10px 16px;
}
.bubble-mine {
  background: #1a1a1a;
  color: #ffffff !important;
  border: 2px solid #444;
  border-bottom-right-radius: 5px;
}
.bubble-mine .bubble-text { color: #ffffff !important; }
.bubble-mine .bubble-time { color: #aaaaaa !important; }

.bubble-theirs {
  background: #ffffff !important;
  color: #000000 !important;
  border: 2px solid #cccccc;
  border-bottom-left-radius: 5px;
}
.bubble-theirs .bubble-text { color: #000000 !important; font-weight: 600; }
.bubble-theirs .bubble-time { color: #666666 !important; }

.bubble-text { font-size: 0.95rem; line-height: 1.5; word-break: break-word; }
.bubble-time {
  font-size: 0.7rem;
  margin-top: 5px;
  opacity: 0.55;
  font-family: 'Space Mono', monospace;
  text-align: right;
}

/* Input bar */
.chat-input-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

#msg-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
  resize: none;
}
#msg-input:focus { border-color: var(--accent); }

.send-btn {
  background: linear-gradient(135deg, var(--accent), #a06fff);
  border: none;
  border-radius: 12px;
  width: 46px; height: 46px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.1s;
}
.send-btn:hover { opacity: 0.85; transform: scale(1.05); }
.send-btn svg { fill: #fff; }

/* Error toast */
#error-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #ff4f6f;
  color: #fff;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 0.9rem;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  z-index: 9999;
  white-space: nowrap;
}
#error-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }



/* ── MOBILE ── */
@media (max-width: 680px) {
  #sidebar {
    position: fixed;
    left: 0; top: 0;
    z-index: 100;
    transform: translateX(-100%);
    width: 85vw;
    box-shadow: 8px 0 32px #0008;
  }
  #sidebar.open { transform: translateX(0); }
  .menu-btn { display: block; }
  #main { width: 100vw; }
  .auth-card { margin: 16px; padding: 32px 24px; }
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="screen">
  <div class="auth-card">
    <div class="auth-logo">Blink ⚡</div>
    <div class="auth-sub">// chat with your friends</div>



    <!-- SIGNUP FORM -->
    <div id="signup-form" class="auth-form">
      <div class="field">
        <label>Your Name</label>
        <input id="signup-name" type="text" placeholder="e.g. Alex" autocomplete="name">
      </div>
      <div class="field">
        <label>Email</label>
        <input id="signup-email" type="email" placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="signup-pass" type="password" placeholder="6+ characters" autocomplete="new-password">
      </div>
      <button class="btn-primary" onclick="doSignup()">Create Account →</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form" class="auth-form" style="display:none">
      <div class="field">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="login-pass" type="password" placeholder="Your password" autocomplete="current-password">
      </div>
      <button class="btn-primary" onclick="doLogin()">Sign In →</button>
    </div>

    <div id="auth-toggle">
      Already have an account? <a onclick="showLogin()">Sign in</a>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen" class="screen">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="brand">Blink ⚡</div>
      <div class="my-profile">
        <div class="my-av" id="my-avatar">?</div>
        <div class="my-name-wrap">
          <div class="my-name-label">logged in as</div>
          <div id="my-name">...</div>
        </div>
        <button class="logout-btn" onclick="doLogout()">Out</button>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="people" onclick="switchTab('people')">People</button>
      </div>
    </div>

    <!-- PEOPLE TAB -->
    <div id="tab-people" class="tab-panel active">
      <div class="search-wrap">
        <input id="search-input" type="text" placeholder="Search by name or email…">
      </div>
      <div id="users-list">
        <div class="empty-state">Loading users…</div>
      </div>
    </div>

    <!-- ADMIN CORNER - hidden subtle button -->
    <div style="padding:8px;margin-top:auto;text-align:right;">
      <button onclick="deleteAllAccounts()" title="Admin: Delete all accounts" style="background:none;border:none;color:#ffffff18;font-size:0.65rem;font-family:'Space Mono',monospace;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all 0.3s;" onmouseover="this.style.color='#ff4f6f';this.style.background='#ff4f6f11'" onmouseout="this.style.color='#ffffff18';this.style.background='none'">⚙ admin</button>
    </div>
  </div>

  <!-- MAIN AREA -->
  <div id="main">
    <!-- Placeholder -->
    <div id="chat-placeholder">
      <div class="placeholder-icon">💬</div>
      <div class="placeholder-text">Pick someone to chat with</div>
      <div class="placeholder-sub">// select a friend from the left</div>
    </div>

    <!-- Chat -->
    <div id="chat-area">
      <div class="chat-header">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div id="chat-avatar">?</div>
        <div id="chat-name">...</div>
      </div>
      <div id="messages-box"></div>
      <div class="chat-input-bar">
        <input id="msg-input" type="text" placeholder="Type a message…">
        <button class="send-btn" onclick="sendMessage()">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="error-toast"></div>

</body>
</html>
